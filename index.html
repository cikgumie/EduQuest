<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Education AI - Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="landing-container">
        <!-- Main Logo / Title -->
        <h1 class="game-title">RPG Education AI</h1>
        <div class="game-subtitle">Transforming Notes into Adventures</div>

        <!-- Resume Game Alert banner if session exists -->
        <div id="resume-banner" class="glass-panel" style="display: none; width: 100%; max-width: 500px; padding: 20px; margin-bottom: 20px; border-color: var(--color-success); background: rgba(16, 185, 129, 0.05); text-align: center;">
            <p style="color: #FFF; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-success);"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Ada Sesi Permainan Aktif!
            </p>
            <p style="font-size: 13px; color: var(--color-text-muted); margin-bottom: 16px;" id="resume-details">
                Pemain: <strong>-</strong> | Level: <strong>-</strong>
            </p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-primary" id="btn-resume" style="box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); background: var(--color-success);">Teruskan Sesi</button>
                <button class="btn btn-secondary" id="btn-discard" style="padding: 10px 15px; font-size: 12px;">Sesi Baru</button>
            </div>
        </div>

        <!-- Portal Tabs Card -->
        <div class="menu-card glass-panel">
            <div class="menu-tabs">
                <div class="tab-item active" id="tab-student" onclick="switchTab('student')">Masuk Game</div>
                <div class="tab-item" id="tab-teacher" onclick="switchTab('teacher')">Panel Guru</div>
            </div>

            <!-- Student View -->
            <div id="student-form-container">
                <form id="student-form" onsubmit="handleStartGame(event)">
                    <div class="form-group">
                        <label class="form-label" for="player-name">Nama Wira Anda</label>
                        <input type="text" id="player-name" class="form-input" placeholder="Masukkan nama wira anda..." required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="game-topic">Pilih Dunia / Topik Pembelajaran</label>
                        <select id="game-topic" class="form-select" required>
                            <option value="" disabled selected>Sedang memuatkan topik...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="game-difficulty">Tahap Kesukaran Mula</label>
                        <select id="game-difficulty" class="form-select">
                            <option value="easy">Easy (Sesuai untuk ulangkaji)</option>
                            <option value="medium" selected>Medium (Standard)</option>
                            <option value="hard">Hard (Cabaran Maksimum)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-cta" style="width: 100%; margin-top: 10px;" id="btn-start-game">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        Mulakan Pengembaraan
                    </button>
                </form>
            </div>

            <!-- Teacher View -->
            <div id="teacher-form-container" style="display: none;">
                <form id="teacher-form" onsubmit="handleCreateTopic(event)">
                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0;">
                        <div class="form-group">
                            <label class="form-label" for="subject-name">Subjek</label>
                            <input type="text" id="subject-name" class="form-input" placeholder="Contoh: RBT" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="form-level">Tingkatan</label>
                            <input type="text" id="form-level" class="form-input" placeholder="Contoh: Tingkatan 1" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="topic-title">Tajuk Bab/Topik</label>
                        <input type="text" id="topic-title" class="form-input" placeholder="Contoh: Bab 3 - Algoritma" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="topic-notes">Nota Pembelajaran (Untuk Penjanaan AI)</label>
                        <textarea id="topic-notes" class="form-textarea" placeholder="Copy-paste nota penuh di sini. AI akan menggunakan nota ini untuk menjana jalan cerita, NPC, quest, dan soalan kuiz..." required></textarea>
                    </div>

                    <div class="form-group" style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; margin-bottom: 0;">
                        <div class="form-group">
                            <label class="form-label" for="topic-theme">Tema Dunia Asas</label>
                            <select id="topic-theme" class="form-select">
                                <option value="Fantasy Kingdom" selected>Medieval Fantasy Kingdom</option>
                                <option value="Cyberpunk">Cyberpunk City</option>
                                <option value="Space Adventure">Space Orbit / Cosmic Odyssey</option>
                                <option value="Pirate Island">Treasure Pirate Island</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="topic-difficulty">Tahap</label>
                            <select id="topic-difficulty" class="form-select">
                                <option value="easy">Easy</option>
                                <option value="medium" selected>Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="btn-create-topic">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        Bina Dunia Pembelajaran
                    </button>
                </form>
            </div>
        </div>

        <div style="font-family: var(--font-mono); font-size: 11px; color: var(--color-text-muted); text-align: center;">
            Database Connected: 1cHsCtca...PNGRIRHA
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/state.js"></script>
    
    <script>
        // Tab switcher
        function switchTab(role) {
            const studentTab = document.getElementById('tab-student');
            const teacherTab = document.getElementById('tab-teacher');
            const studentForm = document.getElementById('student-form-container');
            const teacherForm = document.getElementById('teacher-form-container');

            if (role === 'student') {
                studentTab.classList.add('active');
                teacherTab.classList.remove('active');
                studentForm.style.display = 'block';
                teacherForm.style.display = 'none';
            } else {
                studentTab.classList.remove('active');
                teacherTab.classList.add('active');
                studentForm.style.display = 'none';
                teacherForm.style.display = 'block';
            }
        }

        // Load topics on page load
        async function loadTopics() {
            const select = document.getElementById('game-topic');
            try {
                const data = await ApiClient.getTopics();
                select.innerHTML = '';
                
                if (data.topics && data.topics.length > 0) {
                    data.topics.forEach(t => {
                        const option = document.createElement('option');
                        option.value = t.topicId;
                        option.textContent = `[${t.subject}] ${t.title} (${t.theme})`;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="" disabled>Tiada topik tersedia. Sila buat di Panel Guru.</option>';
                }
            } catch (err) {
                console.error("Failed to load topics:", err);
                select.innerHTML = '<option value="" disabled>Gagal menyambung ke database backend.</option>';
            }
        }

        // Resume session handling
        function checkActiveSession() {
            const hasSession = GameState.loadFromLocalStorage();
            if (hasSession && GameState.sessionId && GameState.playerName) {
                const banner = document.getElementById('resume-banner');
                const details = document.getElementById('resume-details');
                
                details.innerHTML = `Pemain: <strong>${GameState.playerName}</strong> | Level: <strong>${GameState.level}</strong> | Sesi: <strong>${GameState.currentWorld || 'Unknown World'}</strong>`;
                banner.style.display = 'block';
                
                // Set student form name to default
                document.getElementById('player-name').value = GameState.playerName;
            }
        }

        // Handle Start Game
        async function handleStartGame(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-start-game');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin" style="margin-right: 8px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Menjana Dunia AI...`;

            const name = document.getElementById('player-name').value.trim();
            const topicId = document.getElementById('game-topic').value;
            const difficulty = document.getElementById('game-difficulty').value;

            try {
                // Initialize game on GAS
                const initData = await ApiClient.initGame({
                    playerName: name,
                    topicId: topicId,
                    difficulty: difficulty
                });

                // Save to game state
                GameState.clear();
                GameState.init(initData);
                
                // Redirect to game board
                window.location.href = 'game.html';
            } catch (err) {
                alert(`Gagal memulakan game: ${err.message}`);
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        // Handle Create Topic
        async function handleCreateTopic(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-create-topic');
            const originalHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin" style="margin-right: 8px;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Membina Pangkalan Data Dunia...`;

            const subject = document.getElementById('subject-name').value.trim();
            const form = document.getElementById('form-level').value.trim();
            const title = document.getElementById('topic-title').value.trim();
            const notes = document.getElementById('topic-notes').value.trim();
            const theme = document.getElementById('topic-theme').value;
            const difficulty = document.getElementById('topic-difficulty').value;

            try {
                const response = await ApiClient.initTopic({
                    subject,
                    form,
                    title,
                    notes,
                    theme,
                    difficulty
                });

                alert("✅ Pangkalan data dunia berjaya dicipta! Topik kini tersedia untuk dimainkan.");
                document.getElementById('teacher-form').reset();
                
                // Switch back to student and reload topics
                switchTab('student');
                await loadTopics();
            } catch (err) {
                alert(`Gagal memuat naik nota: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        // Initialize elements
        document.getElementById('btn-resume').addEventListener('click', () => {
            window.location.href = 'game.html';
        });

        document.getElementById('btn-discard').addEventListener('click', () => {
            if (confirm("Adakah anda pasti mahu membuang sesi sebelum ini dan memulakan permainan baru? Progress anda akan dipadam.")) {
                GameState.clear();
                document.getElementById('resume-banner').style.display = 'none';
            }
        });

        // Start
        window.addEventListener('DOMContentLoaded', async () => {
            checkActiveSession();
            await loadTopics();
        });
    </script>
    
    <style>
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
